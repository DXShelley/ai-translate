<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local Immersive Translator</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div>
          <h1>本地翻译配置</h1>
          <p>配置 OpenAI 兼容的本地大模型接口，用于划词、句子和段落翻译。</p>
        </div>
        <button id="openOptions" type="button" class="secondary open-options" hidden>打开完整配置页</button>
      </header>

      <form id="settings" class="panel">
        <aside class="profile-sidebar">
          <div class="profile-head">
            <h2>模型配置</h2>
            <div class="profile-head-actions">
              <button id="addProfile" type="button" class="icon-button" title="新增配置" aria-label="新增配置">+</button>
              <button id="duplicateProfile" type="button" class="icon-button" title="复制当前" aria-label="复制当前">⧉</button>
              <button id="deleteProfile" type="button" class="icon-button danger-icon" title="删除当前" aria-label="删除当前">×</button>
              <button id="exportConfig" type="button" class="icon-button" title="导出全部配置" aria-label="导出全部配置">⇩</button>
              <button id="importConfig" type="button" class="icon-button" title="导入配置" aria-label="导入配置">⇧</button>
              <input id="importConfigFile" type="file" accept="application/json,.json" hidden>
            </div>
          </div>
          <div class="profile-body">
            <div id="profileList" class="profile-list" role="listbox" aria-label="模型配置列表"></div>
          </div>
        </aside>

        <div class="profile-content">
          <div class="profile-editor">
            <section class="section">
            <h2>接口预设</h2>
            <div class="form-grid">
              <label>
                <span>常见 API 规范</span>
                <select id="preset" name="preset">
                  <option value="">自定义 OpenAI 兼容接口</option>
                </select>
              </label>

              <fieldset class="priority-field">
                <span>优先级</span>
                <div class="segmented">
                  <label><input type="radio" name="priority" value="1"><span>P1</span></label>
                  <label><input type="radio" name="priority" value="2"><span>P2</span></label>
                  <label><input type="radio" name="priority" value="3"><span>P3</span></label>
                </div>
              </fieldset>
            </div>
          </section>

          <section class="section">
            <h2>模型接口</h2>
            <div class="form-grid">
              <label>
                <span>接口地址</span>
                <input id="baseUrl" name="baseUrl" placeholder="http://localhost:1234/v1" autocomplete="off">
              </label>

              <label>
                <span>接口路径</span>
                <input id="endpointPath" name="endpointPath" placeholder="/chat/completions" autocomplete="off">
              </label>

              <label>
                <span>鉴权方式</span>
                <select id="authType" name="authType">
                  <option value="bearer">Bearer Token</option>
                  <option value="none">不使用鉴权</option>
                </select>
              </label>

              <label>
                <span>API Key</span>
                <input id="apiKey" name="apiKey" type="password" placeholder="本地模型通常可留空" autocomplete="off">
              </label>

              <label>
                <span>已部署模型</span>
                <select id="availableModels" name="availableModels">
                  <option value="">先获取模型列表</option>
                </select>
              </label>

              <label>
                <span>温度</span>
                <input id="temperature" name="temperature" type="number" min="0" max="2" step="0.1">
              </label>

              <label>
                <span>超时毫秒</span>
                <input id="timeoutMs" name="timeoutMs" type="number" min="3000" step="1000">
              </label>

              <div class="field-actions">
                <span>模型发现</span>
                <div class="button-row">
                  <button id="fetchModels" type="button" class="secondary">获取模型列表</button>
                </div>
              </div>
            </div>
          </section>

          <section class="section">
            <h2>提示词</h2>
            <label>
              <span>Jinja 模板严格模式</span>
              <select id="jinjaTemplateMode" name="jinjaTemplateMode">
                <option value="auto">自动检测（推荐）</option>
                <option value="strict">强制启用（适用于 Qwen3/Llama3 等严格模型）</option>
                <option value="disabled">强制禁用（适用于 GPT/Claude 等宽松模型）</option>
              </select>
              <small style="display:block; margin-top: 0.5em; color: #666;">
                严格模式会确保对话以用户提示开始，避免某些模型（如 Qwen3、Llama 3.1）的 Jinja 模板校验错误。
              </small>
            </label>
            <label>
              <span>System 角色提示词</span>
              <textarea id="systemPrompt" name="systemPrompt" rows="7"></textarea>
            </label>
            <label>
              <span>User 角色提示词模板</span>
              <textarea id="userPromptTemplate" name="userPromptTemplate" rows="12"></textarea>
            </label>
          </section>

          <section class="section">
            <h2>翻译参数</h2>
            <div class="form-grid three">
              <label>
                <span>翻译方向</span>
                <select id="translationMode" name="translationMode">
                  <option value="auto-zh-en">自动中英互译</option>
                  <option value="manual">手动指定</option>
                </select>
              </label>

              <label>
                <span>原文语言</span>
                <input id="sourceLanguage" name="sourceLanguage" placeholder="自动检测" autocomplete="off">
              </label>

              <label>
                <span>译文语言</span>
                <select id="targetLanguage" name="targetLanguage">
                  <option value="简体中文">简体中文</option>
                  <option value="繁體中文">繁體中文</option>
                  <option value="English">English</option>
                  <option value="日本語">日本語</option>
                  <option value="한국어">한국어</option>
                  <option value="Français">Français</option>
                  <option value="Deutsch">Deutsch</option>
                  <option value="Español">Español</option>
                </select>
              </label>
            </div>
          </section>

          <section class="section">
            <div class="section-title-row">
              <h2>模型配置文本</h2>
              <div class="button-row">
                <button id="applyProfileText" type="button" class="secondary">应用文本</button>
              </div>
            </div>
            <label>
              <span>JSON 配置</span>
              <textarea id="profileText" class="profile-text" rows="10" spellcheck="false"></textarea>
            </label>
          </section>

          <section class="section">
            <h2>前端交互</h2>
            <div class="form-grid three">
              <label hidden>
                <span>译文显示</span>
                <select id="displayMode" name="displayMode">
                  <option value="bilingual">双语对照</option>
                  <option value="translationOnly">仅显示译文</option>
                  <option value="sourceCollapsed">原文折叠</option>
                </select>
              </label>

              <label hidden>
                <span>双语布局</span>
                <select id="bilingualLayout" name="bilingualLayout">
                  <option value="vertical">上下对照</option>
                  <option value="horizontal">左右对照</option>
                </select>
              </label>

              <label>
                <span>悬停翻译</span>
                <select id="hoverTranslate" name="hoverTranslate">
                  <option value="true">启用</option>
                  <option value="false">关闭</option>
                </select>
              </label>

              <label>
                <span>悬停触发键</span>
                <select id="hoverModifier" name="hoverModifier">
                  <option value="ctrl">Ctrl</option>
                  <option value="alt">Alt</option>
                  <option value="shift">Shift</option>
                  <option value="none">无需按键</option>
                </select>
              </label>

              <label>
                <span>输入框翻译</span>
                <select id="inputTranslate" name="inputTranslate">
                  <option value="true">启用</option>
                  <option value="false">关闭</option>
                </select>
              </label>

              <label>
                <span>请求日志</span>
                <select id="requestLogging" name="requestLogging">
                  <option value="false">关闭</option>
                  <option value="true">开启</option>
                </select>
              </label>

              <label>
                <span>触发空格次数</span>
                <input id="inputTriggerSpaces" name="inputTriggerSpaces" type="number" min="2" max="6" step="1">
              </label>
            </div>
          </section>

          <footer class="actions">
            <div>
              <button type="submit">保存配置</button>
              <button id="test" type="button" class="secondary">测试当前模型</button>
            </div>
            <output id="status"></output>
          </footer>
          </div>

          <aside class="request-log-panel">
            <div class="request-log-panel-head">
              <h2>请求日志</h2>
              <div class="button-row">
                <button id="refreshLogs" type="button" class="secondary">刷新</button>
                <button id="exportLogs" type="button" class="secondary">导出</button>
                <button id="clearLogs" type="button" class="secondary danger">清空</button>
              </div>
            </div>
            <aside id="requestLogDetail" class="request-log-detail-panel" hidden></aside>
            <div id="requestLogList" class="request-log-list"></div>
          </aside>
        </div>
      </form>
    </main>

    <script src="browser-adapter.js"></script>
    <script src="options.js"></script>
  </body>
</html>
